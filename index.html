<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Kindle Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 18px;
      color: #000;
      background: #fff;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .stop {
      border: 2px solid #000;
      padding: 14px;
      margin: 12px 0;
    }

    .route {
      font-size: 18px;
      font-weight: bold;
    }

    .times {
      margin-top: 6px;
      font-size: 16px;
    }

    .small {
      font-size: 12px;
      margin-top: 20px;
      color: #333;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <h1>TTC Stop 7361</h1>

  <div class="stop">
    <div class="route">Route 189 — Westbound</div>
    <div class="times">
      Next: 7 min<br>
      Next: 21 min<br>
      Next: 38 min
    </div>
  </div>

  <div class="stop">
    <div class="route">Route 189 — Eastbound</div>
    <div class="times">
      Next: 5 min<br>
      Next: 18 min<br>
      Next: 33 min
    </div>
  </div>

  <div class="small">
    ⚠ Times are manual. Update from your phone when needed.<br>
    This page is designed to work even on Kindle’s broken browser.
  </div>

</body>
</html>

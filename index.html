<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Eastbound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 14px;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      border: 3px solid #000;
      padding: 18px;
      vertical-align: middle;
    }

    .label {
      font-size: 34px;
      font-weight: bold;
      width: 40%;
    }

    .times {
      font-size: 38px;
      font-weight: bold;
      text-align: right;
      width: 60%;
    }
  </style>
</head>

<body>

  <h1>189 Eastbound</h1>

  <table>
    <tr>
      <td class="label">NEXT</td>
      <td class="times">5 min</td>
    </tr>

    <tr>
      <td class="label">NEXT</td>
      <td class="times">21 min</td>
    </tr>

    <tr>
      <td class="label">NEXT</td>
      <td class="times">44 min</td>
    </tr>
  </table>

</body>
</html>

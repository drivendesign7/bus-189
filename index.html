<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Board</title>

  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 0;
      white-space: nowrap;
    }

    .container {
      display: table;
      width: 100%;
      height: 100%;
    }

    .block {
      display: table-cell;
      text-align: center;
      vertical-align: middle;
      padding: 40px;
    }

    .label {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .time {
      font-size: 220px;
      font-weight: bold;
      line-height: 1;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">5</div>
    </div>

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">21</div>
    </div>

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">44</div>
    </div>

  </div>

</body>
</html>

<script>

const STOP_URL = "https://www.transsee.ca/predict?s=ttc.189.4873";

function buildProxy(url) {
  return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
}

async function loadBusTimes() {

  try {
    const res = await fetch(buildProxy(STOP_URL));
    const text = await res.text();

    // 🔥 NEW SMART MATCH (TransSee format)
    // matches: "1: 3 Mins", "2: 14 Mins", etc
    const matches = [...text.matchAll(/(\d+:\s*\d+\s*Mins)/gi)];

    let times = matches.map(m => {
      // extract just the minutes number
      let num = m[0].match(/(\d+)\s*Mins/i);
      return num ? num[1] + " min" : null;
    }).filter(Boolean);

    if (times.length === 0) {
      document.getElementById("t0").innerText = "NO DATA";
      return;
    }

    document.getElementById("t0").innerText = times[0] || "—";
    document.getElementById("t1").innerText = times[1] || "—";
    document.getElementById("t2").innerText = times[2] || "—";

  } catch (e) {
    document.getElementById("t0").innerText = "NO DATA";
  }
}

window.onload = loadBusTimes;
setInterval(loadBusTimes, 60000);

</script>

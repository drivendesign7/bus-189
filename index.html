<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta http-equiv="refresh" content="60">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, Arial;
  text-align: center;
}

h1 {
  font-size: 60px;
  margin-top: 40px;
}

.time {
  font-size: 180px;
  font-weight: bold;
  margin: 30px 0;
}

.small {
  font-size: 24px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>189 EASTBOUND</h1>

<div class="small">Stop 7361 · Cobalt Ave</div>

<div class="time">LOADING...</div>

<script>
async function loadData() {
  try {
    const url = "https://bustime.ttc.ca/api/1.0/getStopPredictions?stopId=7361";
    
    const res = await fetch(url);
    const data = await res.json();

    const preds = data?.data?.entry?.values?.[0]?.values || [];

    if (preds.length > 0) {
      document.querySelector(".time").innerText =
        preds.slice(0, 3).map(p => p.minutes).join("   ");
    } else {
      document.querySelector(".time").innerText = "—";
    }
  } catch (e) {
    document.querySelector(".time").innerText = "ERROR";
  }
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>

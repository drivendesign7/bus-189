<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Board</title>

  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 0;
      text-align: center;
      white-space: nowrap; /* forces horizontal behavior */
    }

    .block {
      display: inline-block;
      vertical-align: top;
      margin: 40px 30px;
    }

    .label {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .time {
      font-size: 220px;
      font-weight: bold;
      line-height: 1;
    }
  </style>
</head>

<body>

  <div class="block">
    <div class="label">NEXT</div>
    <div class="time">5</div>
  </div>

  <div class="block">
    <div class="label">NEXT</div>
    <div class="time">21</div>
  </div>

  <div class="block">
    <div class="label">NEXT</div>
    <div class="time">44</div>
  </div>

</body>
</html>

<script>

const URL = "https://www.transsee.ca/predict?s=ttc.189.4873";
const PROXY = "https://api.allorigins.win/raw?url=" + encodeURIComponent(URL);

async function loadBus() {
  try {
    const res = await fetch(PROXY);
    const text = await res.text();

    // 🔥 grab full prediction lines first
    const lines = text.split("\n");

    let mins = [];

    for (let line of lines) {
      // match patterns like "10 Mins", "37 Mins"
      let match = line.match(/(\d{1,2})\s*Mins/i);
      if (match) {
        mins.push(match[1] + " min");
      }

      if (mins.length === 3) break;
    }

    if (mins.length === 0) {
      document.getElementById("t0").innerText = "NO DATA";
      return;
    }

    document.getElementById("t0").innerText = mins[0] || "—";
    document.getElementById("t1").innerText = mins[1] || "—";
    document.getElementById("t2").innerText = mins[2] || "—";

  } catch (e) {
    document.getElementById("t0").innerText = "NO DATA";
  }
}

window.onload = loadBus;
setInterval(loadBus, 60000);

</script>

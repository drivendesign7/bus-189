<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="60">
<title>189 Bus Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: row;
  justify-content: space-evenly;
  align-items: center;
  background: white;
}

h1 {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 60px;
  margin: 0;
}

.time {
  font-size: 140px;
  font-weight: bold;
}

.small {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  opacity: 0.5;
}
</style>

<script>

const URL = "https://www.transsee.ca/predict?s=ttc.189.4873";
const PROXY = "https://api.allorigins.win/raw?url=" + encodeURIComponent(URL);

async function loadBus() {
  try {
    const res = await fetch(PROXY);
    const text = await res.text();

    // Try to find ANY "X min" patterns
    let matches = text.match(/\d+\s*min/g);

    if (!matches || matches.length === 0) {
      document.getElementById("t0").innerText = "189";
      document.getElementById("t1").innerText = "NO DATA";
      document.getElementById("t2").innerText = "";
      return;
    }

    document.getElementById("t0").innerText = matches[0] || "—";
    document.getElementById("t1").innerText = matches[1] || "—";
    document.getElementById("t2").innerText = matches[2] || "—";

  } catch (e) {
    document.getElementById("t0").innerText = "189";
    document.getElementById("t1").innerText = "NO DATA";
  }
}

window.onload = loadBus;
setInterval(loadBus, 60000);

</script>

</head>

<body>

<h1>189 BUS</h1>

<div class="time" id="t0">--</div>
<div class="time" id="t1">--</div>
<div class="time" id="t2">--</div>

<div class="small">refreshes every 60 seconds</div>

</body>
</html>

<script>

const URL = "https://www.transsee.ca/predict?s=ttc.189.4873";

async function load() {
  try {
    const res = await fetch(URL);
    const text = await res.text();

    // grab ANY numbers that look like arrival minutes
    const numbers = text.match(/\b\d{1,2}\b/g);

    if (!numbers || numbers.length === 0) {
      document.getElementById("t0").innerText = "189";
      document.getElementById("t1").innerText = "NO DATA";
      document.getElementById("t2").innerText = "";
      return;
    }

    // filter likely arrival times (1–60 min range)
    const mins = numbers
      .map(n => parseInt(n))
      .filter(n => n > 0 && n < 60);

    document.getElementById("t0").innerText = (mins[0] ?? "—") + " min";
    document.getElementById("t1").innerText = (mins[1] ?? "—") + " min";
    document.getElementById("t2").innerText = (mins[2] ?? "—") + " min";

  } catch (e) {
    document.getElementById("t0").innerText = "189";
    document.getElementById("t1").innerText = "NO DATA";
  }
}

window.onload = load;
setInterval(load, 60000);

</script>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Board</title>

  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #fff;
      overflow: hidden;
    }

    /* Rotate entire screen */
    .rotated {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      transform-origin: center;
      white-space: nowrap;
      text-align: center;
      font-family: Arial, sans-serif;
      color: #000;
    }

    .block {
      display: inline-block;
      margin: 40px 60px;
      vertical-align: top;
    }

    .label {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .time {
      font-size: 220px;
      font-weight: bold;
      line-height: 1;
    }
  </style>
</head>

<body>

  <div class="rotated">

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">5</div>
    </div>

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">21</div>
    </div>

    <div class="block">
      <div class="label">NEXT</div>
      <div class="time">44</div>
    </div>

  </div>

</body>
</html>

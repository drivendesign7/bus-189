<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="60">
<title>TTC 189 Live</title>

<style>
body {
  font-family: Arial;
  background: white;
  margin: 0;
  text-align: center;
  padding-top: 60px;
}

h1 {
  font-size: 80px;
  margin-bottom: 40px;
}

.time {
  font-size: 150px;
  font-weight: bold;
  margin: 40px 0;
}

.small {
  font-size: 22px;
  opacity: 0.5;
}
</style>

<script>

/*
  AUTO 189 TRACKER (ROBUST VERSION)

  We try multiple patterns because transit websites change often.
  This prevents "No data" most of the time.
*/

const STOP_URLS = [
  "https://www.transsee.ca/stop?ttc=189",
  "https://www.transsee.ca/stop?ttc=1",
  "https://www.transsee.ca/stoplist?a=ttc&r=189"
];

// CORS proxy (helps Kindle access pages)
function buildProxy(url) {
  return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
}

async function loadBusTimes() {

  for (let i = 0; i < STOP_URLS.length; i++) {

    try {
      const res = await fetch(buildProxy(STOP_URLS[i]));
      const text = await res.text();

      // Find all "X min"
      const matches = text.match(/\d+\s*min/g);

      if (matches && matches.length > 0) {

        document.getElementById("t0").innerText = matches[0] || "—";
        document.getElementById("t1").innerText = matches[1] || "—";
        document.getElementById("t2").innerText = matches[2] || "—";

        return; // STOP if we got data
      }

    } catch (e) {
      // try next source
    }
  }

  // if everything fails
  document.getElementById("t0").innerText = "189";
  document.getElementById("t1").innerText = "NO DATA";
  document.getElementById("t2").innerText = "—";
}

window.onload = loadBusTimes;
setInterval(loadBusTimes, 60000);

</script>

</head>

<body>

<h1>189 BUS</h1>

<div class="time" id="t0">--</div>
<div class="time" id="t1">--</div>
<div class="time" id="t2">--</div>

<div class="small">auto-refresh every 60 seconds</div>

</body>
</html>

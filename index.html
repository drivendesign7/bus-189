<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Eastbound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 18px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 20px;
      color: #333;
    }

    /* horizontal layout */
    .row {
      display: flex;
      flex-direction: row;
      gap: 14px;
      border: 2px solid #000;
      padding: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .label {
      font-size: 20px;
      font-weight: bold;
      min-width: 140px;
    }

    .times {
      font-size: 20px;
      line-height: 1.6;
    }

    .footer {
      font-size: 12px;
      margin-top: 25px;
      color: #444;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <h1>Route 189 — Eastbound</h1>
  <div class="subtitle">Kindle-friendly horizontal view</div>

  <div class="row">
    <div class="label">Next</div>
    <div class="times">5 min</div>
  </div>

  <div class="row">
    <div class="label">Next</div>
    <div class="times">21 min</div>
  </div>

  <div class="row">
    <div class="label">Next</div>
    <div class="times">44 min</div>
  </div>

  <div class="row">
    <div class="label">Status</div>
    <div class="times">Stop 7361</div>
  </div>

  <div class="footer">
    Static Kindle layout — edit times manually from your phone.<br>
    Optimized for readability on e-ink screens.
  </div>

</body>
</html>

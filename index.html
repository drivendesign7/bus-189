<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TTC Eastbound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 16px;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 25px;
      color: #222;
    }

    .row {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;

      border: 3px solid #000;
      padding: 18px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 32px;
      font-weight: bold;
    }

    .times {
      font-size: 36px;
      font-weight: bold;
      text-align: right;
    }

    .footer {
      font-size: 16px;
      margin-top: 30px;
      color: #333;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <h1>189 Eastbound</h1>
  <div class="subtitle">Large Kindle Display Mode</div>

  <div class="row">
    <div class="label">NEXT</div>
    <div class="times">5 min</div>
  </div>

  <div class="row">
    <div class="label">NEXT</div>
    <div class="times">21 min</div>
  </div>

  <div class="row">
    <div class="label">NEXT</div>
    <div class="times">44 min</div>
  </div>

  <div class="footer">
    Manual update dashboard — optimized for Kindle e-ink readability.
  </div>

</body>
</html>

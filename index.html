<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="60">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: -apple-system, Arial;
  text-align: center;
}

h1 {
  font-size: 50px;
  margin-top: 30px;
  font-weight: 600;
}

.time {
  font-size: 200px;
  font-weight: 700;
  margin-top: 40px;
}

.sub {
  font-size: 24px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>189 EASTBOUND</h1>
<div class="sub">Stop 7361 · Cobalt Ave</div>

<div class="time" id="out">LOADING</div>

<script>
async function load() {
  try {
    // stable proxy that bypasses TTC browser blocking
    const url =
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://bustime.ttc.ca/getStopPredictions?stopId=7361");

    const res = await fetch(url);
    const text = await res.text();

    const data = JSON.parse(text);

    const preds =
      data?.data?.entry?.values?.[0]?.values || [];

    if (!preds.length) {
      document.getElementById("out").innerText = "—";
      return;
    }

    document.getElementById("out").innerText =
      preds.slice(0, 3).map(p => p.minutes).join("   ");

  } catch (e) {
    document.getElementById("out").innerText = "NO SIGNAL";
  }
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
